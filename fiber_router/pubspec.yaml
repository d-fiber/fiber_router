name: fiber_router
description: >-
  Typed navigation layer built on go_router declarative view, node, and shell
  routes with fade transitions and code-generated BuildContext extensions.
version: 1.1.2
homepage: https://github.com/d-fiber/fiber_router

topics:
  - navigation
  - router
  - go-router

environment:
  sdk: ^3.12.1
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  go_router: ^17.1.0
  change_case: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
