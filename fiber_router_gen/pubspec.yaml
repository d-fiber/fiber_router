name: fiber_router_gen
description: >-
  Code generator for fiber_router - produces typed BuildContext navigation
  extensions from your PoppinRouter definition. Run once, navigate anywhere.
version: 1.0.0
homepage: https://github.com/d-fiber/fiber_router

topics:
  - navigation
  - router
  - code-generation

environment:
  sdk: ^3.11.0

dependencies:
  analyzer: ^13.0.0
  path: ^1.9.0
  change_case: ^2.2.0

executables:
  fiber_router_gen: fiber_router_gen

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
